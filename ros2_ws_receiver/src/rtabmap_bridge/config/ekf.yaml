ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.5          # Was 0.1 — too tight for network delivery
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.5      # Was 0.2 — increase for network jitter tolerance
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    publish_tf: true             # EKF is THE authority for odom->base_link

    # -- Sensor 0: Wheel Odometry (from Gazebo, via covariance injector) --
    odom0: /odom/filtered_input
    odom0_config: [false, false, false,   # Don't fuse position (let it integrate from velocity)
                   false, false, false,
                   true,  true,  false,   # Fuse vx, vy
                   false, false, true,    # Fuse vyaw
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    # -- Sensor 1: IMU (from Gazebo, via covariance injector) --
    imu0: /imu/filtered_input
    imu0_config: [false, false, false,
                  false, false, false,    # DO NOT fuse absolute yaw (prevents fights with wheel odom)
                  false, false, false,
                  false, false, true,     # Fuse yaw velocity
                  false, false, false]    # DO NOT fuse linear acceleration (prevents gravity drift)
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # -- Sensor 2: Visual Odometry (local on Edge -- zero network latency) --
    odom1: /rgbd_odometry/odom
    odom1_config: [false, false, false,   # Disable VO entirely (featureless Gazebo track causes bad drift)
                   false, false, false,
                   false, false, false,   
                   false, false, false,   
                   false, false, false]
    odom1_differential: false             # Disable differential mode since we use native velocity
    odom1_relative: false

    use_control: true
    control_config: [true, false, false, false, false, true]
    acceleration_limits: [5.0, 0.0, 0.0, 0.0, 0.0, 2.0]
    deceleration_limits: [10.0, 0.0, 0.0, 0.0, 0.0, 4.0]
